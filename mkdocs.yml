site_name: ScopeMask
site_description: Scope-bound opaque id masking.
repo_url: https://github.com/khan-asfi-reza/scopemask
repo_name: khan-asfi-reza/scopemask

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Languages:
      - Python: python.md
      - Go: golang.md
      - JavaScript / TypeScript: js.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
